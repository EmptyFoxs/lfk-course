<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ЛФК Тренер</title>
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2942/2942767.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #121212; color: #ffffff; }
        .app-container { max-width: 600px; margin: 0 auto; min-height: 100vh; }
        /* Прогресс бар */
        #progress-container { width: 100%; height: 6px; background: #333; position: sticky; top: 0; z-index: 20; }
        #progress-bar { height: 100%; background: #30d158; width: 0%; transition: width 0.5s ease; }
        header { padding: 20px; background: #1f1f1f; display: flex; justify-content: space-between; align-items: center; }
        .video-wrapper { width: 100%; background: #000; aspect-ratio: 16 / 9; }
        video { width: 100%; height: 100%; object-fit: contain; }
        .lesson-details { padding: 20px; background: #1c1c1e; }
        .action-btn { width: 100%; padding: 16px; background: #0a84ff; color: #fff; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; }
        .action-btn.completed { background: #30d158; }
        .playlist-item { padding: 16px; background: #1c1c1e; margin-bottom: 8px; border-radius: 12px; border-left: 4px solid transparent; }
        .playlist-item.active { border-left-color: #0a84ff; background: #2c2c2e; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 30; padding: 20px; overflow-y: auto; }
    </style>
</head>
<body>
    <div id="progress-container"><div id="progress-bar"></div></div>
    <div class="app-container">
        <header>
            <h1>Моя ЛФК</h1>
            <button onclick="document.getElementById('history-modal').style.display='block'">График</button>
        </header>
        <div class="video-wrapper"><video id="player" controls playsinline></video></div>
        <div class="lesson-details">
            <h2 id="title">Загрузка...</h2>
            <button id="status-btn" class="action-btn" onclick="toggleTask()">Отметить выполнение</button>
        </div>
        <div id="playlist" style="padding: 20px;"></div>
    </div>

    <div id="history-modal" class="modal">
        <button onclick="this.parentElement.style.display='none'">Закрыть</button>
        <h2 style="margin: 20px 0;">История</h2>
        <div id="history-list"></div>
    </div>

    <script>
        const lessons = [
            { id: 'u1', src: '16224109988534.mp4', title: 'Урок 1: Разминка' },
            { id: 'u2', src: '16224109267638.mp4', title: 'Урок 2: Активация' },
            { id: 'u3', src: '16224108481206.mp4', title: 'Урок 3: Основной блок' },
            { id: 'u4', src: '16224674122422.mp4', title: 'Урок 4: Динамика' },
            { id: 'u5', src: '16224359484086.mp4', title: 'Урок 5: Укрепление' },
            { id: 'u6', src: '16224629033654.mp4', title: 'Урок 6: Заминка' }
        ];

        let currentIndex = 0;
        let progress = JSON.parse(localStorage.getItem('progress')) || {};
        let history = JSON.parse(localStorage.getItem('history')) || [];
        const today = new Date().toLocaleDateString();

        if (localStorage.getItem('last_date') !== today) {
            progress = {};
            localStorage.setItem('last_date', today);
        }

        function toggleTask() {
            const id = lessons[currentIndex].id;
            progress[id] = !progress[id];
            localStorage.setItem('progress', JSON.stringify(progress));
            
            // Если все выполнено
            if (Object.keys(progress).length === 6 && progress[id]) {
                const pain = prompt("Все сделано! Оцените боль (1-10):", "0");
                history.unshift({ date: today, pain: pain });
                localStorage.setItem('history', JSON.stringify(history));
            }
            render();
        }

        function render() {
            const current = lessons[currentIndex];
            document.getElementById('title').textContent = current.title;
            document.getElementById('player').src = current.src;
            
            const btn = document.getElementById('status-btn');
            btn.className = 'action-btn ' + (progress[current.id] ? 'completed' : '');
            btn.textContent = progress[current.id] ? 'Выполнено ✓' : 'Отметить выполнение';

            // Обновление прогресс-бара
            const completedCount = Object.keys(progress).length;
            document.getElementById('progress-bar').style.width = (completedCount / 6 * 100) + '%';

            const list = document.getElementById('playlist');
            list.innerHTML = '';
            lessons.forEach((l, i) => {
                const div = document.createElement('div');
                div.className = 'playlist-item ' + (i === currentIndex ? 'active' : '');
                div.innerHTML = l.title + (progress[l.id] ? ' ✅' : '');
                div.onclick = () => { currentIndex = i; render(); };
                list.appendChild(div);
            });
            
            document.getElementById('history-list').innerHTML = history.map(h => `<div style="padding:10px; border-bottom:1px solid #333;">${h.date} — Боль: ${h.pain}</div>`).join('');
        }
        render();
        // Напоминание в 19:00
    setInterval(() => {
        const now = new Date();
        if (now.getHours() === 19 && now.getMinutes() === 0) {
            if (Notification.permission === "granted") {
                new Notification("Время для ЛФК!", {
                    body: "Не забудьте выполнить упражнения и отметить прогресс.",
                });
            }
        }
    }, 60000); // Проверка каждую минуту
    </script> 
</body>
</html>
