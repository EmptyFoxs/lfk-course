<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ЛФК Тренер</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background-color: #121212; color: #fff; }
        .app-container { max-width: 600px; margin: 0 auto; min-height: 100vh; padding: 20px; }
        .video-wrapper { width: 100%; aspect-ratio: 16/9; background: #000; margin-bottom: 20px; }
        video { width: 100%; height: 100%; }
        .action-btn { width: 100%; padding: 16px; background: #0a84ff; border: none; color: white; border-radius: 12px; font-weight: 600; margin-bottom: 10px; }
        .reset-btn { width: 100%; padding: 10px; background: #ff453a; border: none; color: white; border-radius: 12px; margin-top: 20px; }
        .playlist-item { padding: 16px; background: #1c1c1e; margin-bottom: 8px; border-radius: 10px; }
        .active { border: 2px solid #0a84ff; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; padding: 20px; }
    </style>
</head>
<body>
    <div class="app-container">
        <header style="display:flex; justify-content:space-between; margin-bottom:20px;">
            <h1>ЛФК</h1>
            <button onclick="document.getElementById('modal').style.display='block'">График</button>
        </header>

        <div class="video-wrapper"><video id="player" controls playsinline></video></div>
        <h2 id="title">Загрузка...</h2>
        <button id="status-btn" class="action-btn" onclick="toggleTask()">Отметить выполнение</button>
        <div id="playlist"></div>
        
        <button class="reset-btn" onclick="hardReset()">Сбросить всё (Начать заново)</button>
    </div>

    <div id="modal" class="modal">
        <button onclick="this.parentElement.style.display='none'">Закрыть</button>
        <h2 style="margin:20px 0;">История</h2>
        <div id="history-list"></div>
    </div>

    <script>
        const lessons = [
            { id: 'u1', src: '16224109988534.mp4', title: 'Урок 1: Разминка' },
            { id: 'u2', src: '16224109267638.mp4', title: 'Урок 2: Активация' },
            { id: 'u3', src: '16224108481206.mp4', title: 'Урок 3: Сила' },
            { id: 'u4', src: '16224674122422.mp4', title: 'Урок 4: Динамика' },
            { id: 'u5', src: '16224359484086.mp4', title: 'Урок 5: Укрепление' },
            { id: 'u6', src: '16224629033654.mp4', title: 'Урок 6: Заминка' }
        ];

        let currentIndex = 0;
        
        // Функция полной очистки
        function hardReset() {
            if(confirm("Удалить все данные, историю и сбросить кэш?")) {
                localStorage.clear();
                location.reload(true); // Принудительная перезагрузка
            }
        }

        function loadData() {
            return {
                progress: JSON.parse(localStorage.getItem('progress') || '{}'),
                history: JSON.parse(localStorage.getItem('history') || '[]'),
                lastDate: localStorage.getItem('last_date') || ''
            };
        }

        let data = loadData();
        const today = new Date().toLocaleDateString();

        if (data.lastDate !== today) {
            data.progress = {};
            localStorage.setItem('last_date', today);
            localStorage.setItem('progress', '{}');
        }

        function toggleTask() {
            const id = lessons[currentIndex].id;
            data.progress[id] = !data.progress[id];
            localStorage.setItem('progress', JSON.stringify(data.progress));
            
            if (Object.keys(data.progress).length === 6 && data.progress[id]) {
                const pain = prompt("Все уроки выполнены! Оцените дискомфорт (1-10):", "0");
                data.history.unshift({ date: today, pain: pain });
                localStorage.setItem('history', JSON.stringify(data.history));
            }
            render();
        }

        function render() {
            const current = lessons[currentIndex];
            document.getElementById('title').textContent = current.title;
            document.getElementById('player').src = current.src;
            
            const btn = document.getElementById('status-btn');
            btn.textContent = data.progress[current.id] ? 'Выполнено ✓' : 'Отметить выполнение';
            btn.style.background = data.progress[current.id] ? '#30d158' : '#0a84ff';

            const list = document.getElementById('playlist');
            list.innerHTML = '';
            lessons.forEach((l, i) => {
                const div = document.createElement('div');
                div.className = 'playlist-item ' + (i === currentIndex ? 'active' : '');
                div.innerHTML = l.title + (data.progress[l.id] ? ' ✅' : '');
                div.onclick = () => { currentIndex = i; render(); };
                list.appendChild(div);
            });
            
            document.getElementById('history-list').innerHTML = data.history.map(h => 
                `<div style="padding:10px; border-bottom:1px solid #333;">${h.date} — Боль: ${h.pain}/10</div>`
            ).join('');
        }
        render();
    </script>
</body>
</html>
