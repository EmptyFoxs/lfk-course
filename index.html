<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Онлайн-Курс ЛФК</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Мой Курс">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background-color: #121212;
            color: #ffffff;
            -webkit-font-smoothing: antialiased;
            display: block;
        }
        .app-container {
            max-width: 600px;
            margin: 0 auto;
            display: block;
            min-height: 100vh;
            background-color: #121212;
        }
        header {
            padding: 20px;
            text-align: center;
            background: #1f1f1f;
            border-bottom: 1px solid #2c2c2e;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        header h1 {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }
        .video-wrapper {
            width: 100%;
            background: #000;
            position: relative;
            aspect-ratio: 16 / 9;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .lesson-details {
            padding: 20px;
            background: #1c1c1e;
            border-bottom: 1px solid #2c2c2e;
        }
        .lesson-details h2 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #ffffff;
        }
        .lesson-details p {
            font-size: 14px;
            color: #aeaeb2;
            line-height: 1.4;
            margin-bottom: 16px;
        }
        .action-btn {
            display: block;
            width: 100%;
            padding: 16px;
            background: #0a84ff;
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        .action-btn:active {
            transform: scale(0.98);
        }
        .action-btn.completed {
            background: #30d158;
        }
        .playlist-header {
            padding: 20px 20px 10px 20px;
            font-size: 14px;
            text-transform: uppercase;
            color: #8e8e93;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .playlist {
            padding: 0 20px 30px 20px;
        }
        .playlist-item {
            display: flex;
            align-items: center;
            padding: 16px;
            background: #1c1c1e;
            border-radius: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: border-color 0.2s, background-color 0.2s;
        }
        .playlist-item.active {
            border-color: #0a84ff;
            background: #2c2c2e;
        }
        .item-info {
            flex-grow: 1;
        }
        .item-title {
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 4px;
        }
        .item-status {
            font-size: 13px;
            color: #8e8e93;
        }
        .playlist-item.active .item-title {
            color: #0a84ff;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Программа тренировок ЛФК</h1>
        </header>
        
        <div class="video-wrapper">
            <video id="player" controls playsinline>
                <source src="16224109988534.mp4" type="video/mp4">
                Ваш браузер не поддерживает видео.
            </video>
        </div>
        
        <div class="lesson-details">
            <h2 id="title">Загрузка...</h2>
            <p id="desc">Пожалуйста, выберите упражнение из списка ниже.</p>
            <button id="status-btn" class="action-btn">Отметить как выполненное</button>
        </div>
        
        <div class="playlist-header">Список упражнений</div>
        <div class="playlist" id="playlist-container"></div>
    </div>

    <script>
        const lessons = [
            { id: 'u1', src: '16224109988534.mp4', title: 'Урок 1: Разминка и подготовка', desc: 'Вводная часть комплекса. Настраиваем дыхание, подготавливаем суставы и мышцы к нагрузке.' },
            { id: 'u2', src: '16224109267638.mp4', title: 'Урок 2: Базовая активация', desc: 'Начало работы с фитнес-резинками. Выполняем движения плавно, контролируя натяжение.' },
            { id: 'u3', src: '16224108481206.mp4', title: 'Урок 3: Основной силовой блок', desc: 'Проработка целевых мышечных групп с использованием платформы. Следите за осанкой.' },
            { id: 'u4', src: '16224674122422.mp4', title: 'Урок 4: Интенсивный комплекс', desc: 'Увеличиваем амплитуду движений. Работаем в устойчивом темпе, без резких рывков.' },
            { id: 'u5', src: '16224359484086.mp4', title: 'Урок 5: Укрепление и баланс', desc: 'Фиксация положений, статическая и динамическая нагрузка для стабилизации суставов.' },
            { id: 'u6', src: '16224629033654.mp4', title: 'Урок 6: Растяжка и заминка', desc: 'Восстановление пульса, плавное растяжение задействованных мышц и расслабление.' }
        ];

        let currentIndex = 0;
        const player = document.getElementById('player');
        const titleView = document.getElementById('title');
        const descView = document.getElementById('desc');
        const statusBtn = document.getElementById('status-btn');
        const playlistContainer = document.getElementById('playlist-container');

        let userProgress = JSON.parse(localStorage.getItem('lfc_progress')) || {};

        function initLesson(index) {
            currentIndex = index;
            const current = lessons[index];
            player.src = current.src;
            titleView.textContent = current.title;
            descView.textContent = current.desc;
            
            updateButton();
            renderPlaylist();
        }

        function updateButton() {
            const currentId = lessons[currentIndex].id;
            if (userProgress[currentId]) {
                statusBtn.textContent = 'Выполнено ✓';
                statusBtn.classList.add('completed');
            } else {
                statusBtn.textContent = 'Отметить как выполненное';
                statusBtn.classList.remove('completed');
            }
        }

        statusBtn.addEventListener('click', () => {
            const currentId = lessons[currentIndex].id;
            userProgress[currentId] = !userProgress[currentId];
            localStorage.setItem('lfc_progress', JSON.stringify(userProgress));
            updateButton();
            renderPlaylist();
        });

        function renderPlaylist() {
            playlistContainer.innerHTML = '';
            lessons.forEach((lesson, idx) => {
                const item = document.createElement('div');
                item.className = `playlist-item ${idx === currentIndex ? 'active' : ''}`;
                
                const info = document.createElement('div');
                info.className = 'item-info';
                
                const title = document.createElement('div');
                title.className = 'item-title';
                title.textContent = lesson.title;
                
                const status = document.createElement('div');
                status.className = 'item-status';
                
                if (userProgress[lesson.id]) {
                    status.textContent = 'Выполнено';
                    status.style.color = '#30d158';
                } else {
                    status.textContent = 'Предстоит выполнить';
                }
                
                info.appendChild(title);
                info.appendChild(status);
                item.appendChild(info);
                
                item.addEventListener('click', () => {
                    initLesson(idx);
                    player.play();
                });
                
                playlistContainer.appendChild(item);
            });
        }

        initLesson(0);
    </script>
</body>
</html>
