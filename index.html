<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Онлайн-Курс ЛФК</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Мой Курс">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #121212; color: #ffffff; -webkit-font-smoothing: antialiased; display: block; }
        .app-container { max-width: 600px; margin: 0 auto; display: block; min-height: 100vh; background-color: #121212; position: relative;}
        header { padding: 20px; background: #1f1f1f; border-bottom: 1px solid #2c2c2e; position: sticky; top: 0; z-index: 10; display: flex; justify-content: space-between; align-items: center;}
        header h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.5px; margin: 0; text-align: center; flex-grow: 1;}
        .history-btn { background: none; border: none; color: #0a84ff; font-size: 16px; cursor: pointer; font-weight: 500;}
        .video-wrapper { width: 100%; background: #000; position: relative; aspect-ratio: 16 / 9; }
        video { width: 100%; height: 100%; object-fit: contain; }
        .lesson-details { padding: 20px; background: #1c1c1e; border-bottom: 1px solid #2c2c2e; }
        .lesson-details h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; color: #ffffff; }
        .lesson-details p { font-size: 14px; color: #aeaeb2; line-height: 1.4; margin-bottom: 16px; }
        .action-btn { display: block; width: 100%; padding: 16px; background: #0a84ff; color: #ffffff; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; text-align: center; cursor: pointer; transition: background 0.2s, transform 0.1s; }
        .action-btn:active { transform: scale(0.98); }
        .action-btn.completed { background: #30d158; }
        .playlist-header { padding: 20px 20px 10px 20px; font-size: 14px; text-transform: uppercase; color: #8e8e93; font-weight: 600; letter-spacing: 0.5px; }
        .playlist { padding: 0 20px 30px 20px; }
        .playlist-item { display: flex; align-items: center; padding: 16px; background: #1c1c1e; border-radius: 12px; margin-bottom: 10px; cursor: pointer; border: 2px solid transparent; transition: border-color 0.2s, background-color 0.2s; }
        .playlist-item.active { border-color: #0a84ff; background: #2c2c2e; }
        .item-info { flex-grow: 1; }
        .item-title { font-size: 16px; font-weight: 600; color: #ffffff; margin-bottom: 4px; }
        .item-status { font-size: 13px; color: #8e8e93; }
        .playlist-item.active .item-title { color: #0a84ff; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 20; justify-content: center; align-items: flex-end; }
        .modal.active { display: flex; }
        .modal-content { background: #1c1c1e; width: 100%; max-width: 600px; height: 80vh; border-radius: 20px 20px 0 0; padding: 20px; overflow-y: auto; display: flex; flex-direction: column;}
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-header h2 { font-size: 20px; margin: 0; }
        .close-modal { background: #3a3a3c; border: none; color: white; width: 30px; height: 30px; border-radius: 15px; font-size: 16px; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        .history-container { flex-grow: 1; overflow-y: auto; }
        .history-day { margin-bottom: 20px; }
        .history-date { font-size: 14px; color: #8e8e93; margin-bottom: 8px; text-transform: uppercase; font-weight: 600;}
        .history-item { background: #2c2c2e; padding: 12px 16px; border-radius: 10px; margin-bottom: 6px; font-size: 15px; color: #fff;}
        .empty-history { text-align: center; color: #8e8e93; margin-top: 50px; font-size: 15px;}
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <div style="width: 70px;"></div>
            <h1>Курс ЛФК</h1>
            <button class="history-btn" id="open-history">График</button>
        </header>
        
        <div class="video-wrapper">
            <video id="player" controls playsinline>
                <source src="16224109988534.mp4" type="video/mp4">
                Ваш браузер не поддерживает видео.
            </video>
        </div>
        
        <div class="lesson-details">
            <h2 id="title">Загрузка...</h2>
            <p id="desc">Пожалуйста, выберите упражнение из списка ниже.</p>
            <button id="status-btn" class="action-btn">Отметить как выполненное</button>
        </div>
        
        <div class="playlist-header">Список упражнений</div>
        <div class="playlist" id="playlist-container"></div>
    </div>

    <div class="modal" id="history-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>График занятий</h2>
                <button class="close-modal" id="close-history">✕</button>
            </div>
            <div class="history-container" id="history-container"></div>
        </div>
    </div>

    <script>
        const lessons = [
            { id: 'u1', src: '16224109988534.mp4', title: 'Урок 1: Разминка и подготовка', desc: 'Вводная часть комплекса.' },
            { id: 'u2', src: '16224109267638.mp4', title: 'Урок 2: Базовая активация', desc: 'Начало работы с фитнес-резинками.' },
            { id: 'u3', src: '16224108481206.mp4', title: 'Урок 3: Основной силовой блок', desc: 'Проработка целевых мышечных групп.' },
            { id: 'u4', src: '16224674122422.mp4', title: 'Урок 4: Интенсивный комплекс', desc: 'Увеличиваем амплитуду движений.' },
            { id: 'u5', src: '16224359484086.mp4', title: 'Урок 5: Укрепление и баланс', desc: 'Статическая и динамическая нагрузка.' },
            { id: 'u6', src: '16224629033654.mp4', title: 'Урок 6: Растяжка и заминка', desc: 'Восстановление пульса и растяжение.' }
        ];

        let currentIndex = 0;
        const player = document.getElementById('player');
        const titleView = document.getElementById('title');
        const descView = document.getElementById('desc');
        const statusBtn = document.getElementById('status-btn');
        const playlistContainer = document.getElementById('playlist-container');
        const historyModal = document.getElementById('history-modal');
        const openHistoryBtn = document.getElementById('open-history');
        const closeHistoryBtn = document.getElementById('close-history');
        const historyContainer = document.getElementById('history-container');

        // Получаем текущую дату (без времени)
        const todayString = new Date().toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });
        
        // Достаем дату последнего визита и прогресс
        let savedDate = localStorage.getItem('lfc_last_date');
        let userProgress = JSON.parse(localStorage.getItem('lfc_progress')) || {};
        let userHistory = JSON.parse(localStorage.getItem('lfc_history')) || [];

        // ЕЖЕДНЕВНЫЙ СБРОС: Если дата не совпадает с сегодняшней — обнуляем прогресс (но не историю!)
        if (savedDate !== todayString) {
            userProgress = {};
            localStorage.setItem('lfc_progress', JSON.stringify(userProgress));
            localStorage.setItem('lfc_last_date', todayString);
        }

        function initLesson(index) {
            currentIndex = index;
            const current = lessons[index];
            player.src = current.src;
            titleView.textContent = current.title;
            descView.textContent = current.desc;
            updateButton();
            renderPlaylist();
        }

        function updateButton() {
            const currentId = lessons[currentIndex].id;
            if (userProgress[currentId]) {
                statusBtn.textContent = 'Выполнено ✓';
                statusBtn.classList.add('completed');
            } else {
                statusBtn.textContent = 'Отметить как выполненное';
                statusBtn.classList.remove('completed');
            }
        }

        statusBtn.addEventListener('click', () => {
            const currentId = lessons[currentIndex].id;
            const currentTitle = lessons[currentIndex].title;

            userProgress[currentId] = !userProgress[currentId];
            localStorage.setItem('lfc_progress', JSON.stringify(userProgress));

            if (userProgress[currentId]) {
                userHistory.unshift({ id: currentId, title: currentTitle, date: todayString, timestamp: Date.now() });
            } else {
                const idx = userHistory.findIndex(h => h.id === currentId && h.date === todayString);
                if (idx > -1) userHistory.splice(idx, 1);
            }
            
            localStorage.setItem('lfc_history', JSON.stringify(userHistory));

            updateButton();
            renderPlaylist();
            renderHistory();
        });

        function renderPlaylist() {
            playlistContainer.innerHTML = '';
            lessons.forEach((lesson, idx) => {
                const item = document.createElement('div');
                item.className = `playlist-item ${idx === currentIndex ? 'active' : ''}`;
                
                const info = document.createElement('div');
                info.className = 'item-info';
                
                const title = document.createElement('div');
                title.className = 'item-title';
                title.textContent = lesson.title;
                
                const status = document.createElement('div');
                status.className = 'item-status';
                status.textContent = userProgress[lesson.id] ? 'Выполнено' : 'Предстоит выполнить';
                if (userProgress[lesson.id]) status.style.color = '#30d158';
                
                info.appendChild(title);
                info.appendChild(status);
                item.appendChild(info);
                
                item.addEventListener('click', () => {
                    initLesson(idx);
                    player.play();
                });
                
                playlistContainer.appendChild(item);
            });
        }

        function renderHistory() {
            historyContainer.innerHTML = '';
            if (userHistory.length === 0) {
                historyContainer.innerHTML = '<div class="empty-history">Вы пока не выполнили ни одного упражнения.</div>';
                return;
            }

            const grouped = userHistory.reduce((acc, item) => {
                if (!acc[item.date]) acc[item.date] = [];
                if (!acc[item.date].some(x => x.id === item.id)) {
                    acc[item.date].push(item);
                }
                return acc;
            }, {});

            for (const [date, items] of Object.entries(grouped)) {
                const dayDiv = document.createElement('div');
                dayDiv.className = 'history-day';
                
                const dateHeader = document.createElement('div');
                dateHeader.className = 'history-date';
                dateHeader.textContent = date;
                dayDiv.appendChild(dateHeader);

                items.forEach(item => {
                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'history-item';
                    itemDiv.textContent = item.title;
                    dayDiv.appendChild(itemDiv);
                });

                historyContainer.appendChild(dayDiv);
            }
        }

        openHistoryBtn.addEventListener('click', () => {
            renderHistory();
            historyModal.classList.add('active');
        });

        closeHistoryBtn.addEventListener('click', () => {
            historyModal.classList.remove('active');
        });

        initLesson(0);
    </script>
</body>
</html>
