<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Курс ЛФК</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #121212; color: #ffffff; }
        .app-container { max-width: 600px; margin: 0 auto; min-height: 100vh; padding-bottom: 30px; }
        header { padding: 20px; background: #1f1f1f; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10; }
        .video-wrapper { width: 100%; aspect-ratio: 16/9; background: #000; }
        video { width: 100%; height: 100%; }
        .lesson-details { padding: 20px; background: #1c1c1e; }
        .action-btn { width: 100%; padding: 16px; background: #0a84ff; color: #fff; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; }
        .action-btn.completed { background: #30d158; }
        .playlist { padding: 20px; }
        .playlist-item { padding: 16px; background: #1c1c1e; border-radius: 12px; margin-bottom: 10px; border: 2px solid transparent; }
        .playlist-item.active { border-color: #0a84ff; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 20; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { background: #1c1c1e; padding: 20px; border-radius: 20px; width: 90%; max-width: 400px; }
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <h1>ЛФК</h1>
            <button onclick="document.getElementById('modal').classList.add('active')">График</button>
        </header>
        <div class="video-wrapper"><video id="player" controls playsinline></video></div>
        <div class="lesson-details">
            <h2 id="title">Выберите урок</h2>
            <button id="status-btn" class="action-btn" onclick="toggleComplete()">Отметить выполнение</button>
        </div>
        <div class="playlist" id="playlist"></div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h2>График занятий</h2>
            <div id="history-list" style="margin: 20px 0; max-height: 300px; overflow-y: auto;"></div>
            <button onclick="document.getElementById('modal').classList.remove('active')">Закрыть</button>
        </div>
    </div>

    <script>
        const lessons = [
            { id: 'u1', src: '16224109988534.mp4', title: 'Урок 1' }, { id: 'u2', src: '16224109267638.mp4', title: 'Урок 2' },
            { id: 'u3', src: '16224108481206.mp4', title: 'Урок 3' }, { id: 'u4', src: '16224674122422.mp4', title: 'Урок 4' },
            { id: 'u5', src: '16224359484086.mp4', title: 'Урок 5' }, { id: 'u6', src: '16224629033654.mp4', title: 'Урок 6' }
        ];
        
        let currentIndex = 0;
        let progress = JSON.parse(localStorage.getItem('progress')) || {};
        let history = JSON.parse(localStorage.getItem('history')) || [];
        const today = new Date().toLocaleDateString();

        if (localStorage.getItem('last_date') !== today) {
            progress = {};
            localStorage.setItem('last_date', today);
            localStorage.setItem('progress', '{}');
        }

        function toggleComplete() {
            const id = lessons[currentIndex].id;
            progress[id] = !progress[id];
            localStorage.setItem('progress', JSON.stringify(progress));
            
            if (currentIndex === 5 && progress[id]) {
                const pain = prompt("Тренировка завершена! Оцените общий уровень дискомфорта (1-10):", "0");
                history.unshift({ date: today, pain: pain });
                localStorage.setItem('history', JSON.stringify(history));
            }
            render();
        }

        function render() {
            document.getElementById('title').textContent = lessons[currentIndex].title;
            document.getElementById('player').src = lessons[currentIndex].src;
            const btn = document.getElementById('status-btn');
            btn.className = 'action-btn ' + (progress[lessons[currentIndex].id] ? 'completed' : '');
            
            const list = document.getElementById('playlist');
            list.innerHTML = '';
            lessons.forEach((l, i) => {
                const div = document.createElement('div');
                div.className = 'playlist-item ' + (i === currentIndex ? 'active' : '');
                div.innerHTML = l.title + (progress[l.id] ? ' ✓' : '');
                div.onclick = () => { currentIndex = i; render(); };
                list.appendChild(div);
            });
            
            const hist = document.getElementById('history-list');
            hist.innerHTML = history.map(h => `<div>${h.date} — Боль: ${h.pain}</div>`).join('');
        }
        render();
    </script>
</body>
</html>
